name: Contributor Badge

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  award-badge:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Award contributor badge comment
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;

            if (author.endsWith('[bot]')) {
              core.info('Skipping bot contributor.');
              return;
            }

            const query = `repo:${owner}/${repo} is:pr is:merged author:${author}`;
            const searchResult = await github.rest.search.issuesAndPullRequests({
              q: query,
              per_page: 1
            });
            const mergedCount = searchResult.data.total_count;

            let tier = 'First Contribution';
            let color = '22c55e';

            if (mergedCount >= 15) {
              tier = 'Gold Contributor';
              color = 'f59e0b';
            } else if (mergedCount >= 7) {
              tier = 'Silver Contributor';
              color = '94a3b8';
            } else if (mergedCount >= 3) {
              tier = 'Bronze Contributor';
              color = 'b45309';
            }

            const badgeUrl = `https://img.shields.io/badge/DevDeck-${encodeURIComponent(tier)}-${color}?style=for-the-badge&logo=github`;
            const body = [
              `## Thanks @${author}!`,
              ``,
              `You earned a **${tier}** badge for your contribution to DevDeck.`,
              ``,
              `![DevDeck Contributor Badge](${badgeUrl})`,
              ``,
              `Your support helps make DevDeck better for the whole developer community.`
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body
            });
